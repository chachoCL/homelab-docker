services:
  traefik:
    image: traefik:v3.6.5
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - 80:80
      - 443:443
      # - 443:443/tcp # Uncomment if you want HTTP3
      # - 443:443/udp # Uncomment if you want HTTP3
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_api_token # note using _FILE for docker secrets
      # CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN} # if using .env
      TRAEFIK_DASHBOARD_CREDENTIALS: ${TRAEFIK_DASHBOARD_CREDENTIALS}
    secrets:
      - cf_api_token
    env_file: .env # use .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik.yml:/traefik.yml:ro
      - ./data/acme.json:/acme.json
      - ./dynamic/:/dynamic
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=http"
      - "traefik.http.routers.traefik.rule=Host(`traefik-dashboard.local.joseluna.dev`)"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"
      - "traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik.middlewares=traefik-https-redirect"
      - "traefik.http.routers.traefik-secure.entrypoints=https"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik-dashboard.local.joseluna.dev`)"
      - "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-secure.tls.domains[0].main=joseluna.dev"
      - "traefik.http.routers.traefik-secure.tls.domains[0].sans=*.joseluna.dev"
      - "traefik.http.routers.traefik-secure.tls.domains[1].main=local.joseluna.dev"
      - "traefik.http.routers.traefik-secure.tls.domains[1].sans=*.local.joseluna.dev"
      - "traefik.http.routers.traefik-secure.service=api@internal"

  whoami:
    image: acouvreur/whoami:v1.10.2
    labels:
      - sablier.enable=true
      - sablier.group=demo
    restart: unless-stopped
    container_name: whoami
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy

  sablier:
    image: sablierapp/sablier:1.11.0
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - './sablier/data:/data'
    restart: unless-stopped
    container_name: sablier
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    #labels:
    #  - "traefik.enable=true"
    #  - "traefik.http.routers.sablier.rule=Host(`waiter.local.joseluna.dev`)"
    #  - "traefik.http.routers.sablier.entrypoints=https"
    #  - "traefik.http.routers.sablier.tls.certresolver=cloudflare"
    #  - "traefik.http.services.sablier.loadbalancer.server.port=10000"

  certdumper:
    image: ghcr.io/kereis/traefik-certs-dumper:latest
    volumes:
      - ./data:/traefik:ro
      - ./letsencrypt/dumped:/output:rw
    networks:
      - proxy

secrets:
  cf_api_token:
    file: ./cf_api_token.txt

#networks:
#  proxy:
#    external: true

networks:
  proxy:
    name: proxy
