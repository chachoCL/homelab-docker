http:
  routers:
    n8n:
      rule: "Host(`n8n.joseluna.dev`)"   # cambia dominio
      entryPoints:
        - https
      tls:
        certResolver: cloudflare 
      service: n8n

    adminer:
      rule: "Host(`adminer.local.joseluna.dev`)"   # cambia dominio
      entryPoints:
        - https
      tls:
        certResolver: cloudflare 
      service: adminer


  services:
    n8n:
      loadBalancer:
        servers:
          - url: "http://n8n:5678"
    adminer:
      loadBalancer:
        servers:
          - url: "http://n8n-adminer-1:8080"
