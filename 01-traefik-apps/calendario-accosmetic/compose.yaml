services:
  salon-app:
    image: ghcr.io/chachocl/calendario-ac-cosmetic:v0.0.4
    container_name: beauty-salon-app
    ports:
      - "3001:3001"
 #   networks:
 #     - proxy
    volumes:
      - salon-data:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/salon.db
      - JWT_SECRET=feb1ea6adda6d086f4a91ddf07a6661311b8282ee9b4659f
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  salon-data:
    driver: local
#networks:
#  proxy:
#    external: true
