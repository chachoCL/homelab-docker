services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: https://beszel.joseluna.dev
    networks:
      - proxy
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket

networks:
  proxy:
    external: true
