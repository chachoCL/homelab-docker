services:
    portainer:
        container_name: portainer
        image: portainer/portainer-ce:lts
        restart: always
#        ports:
#            - 8000:8000
#            - 9443:9443
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - portainer_data:/data
        networks:
            - proxy
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.portainer.entrypoints=http"
          - "traefik.http.routers.portainer.rule=Host(`portainer.local.joseluna.dev`)"
          - "traefik.http.middlewares.portainer-https-redirect.redirectscheme.scheme=https"
          - "traefik.http.routers.portainer.middlewares=portainer-https-redirect"
          - "traefik.http.routers.portainer-secure.entrypoints=https"
          - "traefik.http.routers.portainer-secure.rule=Host(`portainer.local.joseluna.dev`)"
          - "traefik.http.routers.portainer-secure.tls=true"
          - "traefik.http.routers.portainer-secure.tls.certresolver=cloudflare"
          - "traefik.http.services.portainer.loadbalancer.server.port=9443"
          - "traefik.http.services.portainer.loadbalancer.server.scheme=https"

volumes:
    portainer_data:
        external: true

networks:
  proxy:
    external: true
