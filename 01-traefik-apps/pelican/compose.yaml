services:
  database:
    image: mariadb:10.11
    container_name: pelican_mariadb
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./panel/db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: panel
      MYSQL_USER: pelican
      MYSQL_PASSWORD: ${PELICAN_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${PELICAN_DB_ROOT_PASSWORD}
    networks:
      - pelican
  cache:
    image: redis:alpine
    container_name: pelican_redis
    restart: unless-stopped
    networks:
      - pelican
  panel:
    image: ghcr.io/pelican-dev/panel:latest
    container_name: pelican_panel
    restart: unless-stopped
#    ports:
      # - "9000:9000" # enable when not using caddy to be able to reach php-fpm
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
    volumes:
      - "./pelican-data:/pelican-data"
      - "./pelican-logs:/var/www/html/storage/logs"
      - "./Caddyfile:/etc/caddy/Caddyfile"
    environment:
      timezone: "America/Santiago"
      TRUSTED_PROXIES: "*"
      MAIL_DRIVER: "smtp"
      MAIL_HOST: "mail.joseluna.dev"
      MAIL_PORT: "465"
      MAIL_FROM: "no-reply@joseluna.dev"
      MAIL_USERNAME: "no-reply@joseluna.dev"
      MAIL_PASSWORD: ${PELICAN_MAIL_PASSWORD}
      APP_URL: "https://pelican.joseluna.dev"
      LE_EMAIL: "jose@joseluna.dev"
      APP_DEBUG: "FALSE"
      APP_ENV: "production"
      XDG_DATA_HOME: /pelican-data
     # SKIP_CADDY: "true"
      CACHE_STORE: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_CONNECTION: "redis"
      REDIS_HOST: "cache"
      DB_CONNECTION: "mariadb"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "panel"
      DB_USERNAME: "pelican"
      DB_PASSWORD: ${PELICAN_DB_PASSWORD}
    networks:
      - proxy
      - pelican
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.pelican-panel.entrypoints=http"
      - "traefik.http.routers.pelican-panel.rule=Host(`pelican.joseluna.dev`)"
      - "traefik.http.middlewares.pelican-panel-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.pelican-panel.middlewares=pelican-panel-https-redirect"
      - "traefik.http.routers.pelican-panel-secure.entrypoints=https"
      - "traefik.http.routers.pelican-panel-secure.rule=Host(`pelican.joseluna.dev`)"
      - "traefik.http.routers.pelican-panel-secure.tls=true"
      - "traefik.http.routers.pelican-panel-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.pelican-panel-secure.service=pelican-panel"
      - "traefik.http.services.pelican-panel.loadbalancer.server.port=80"

  wings:
    image: ghcr.io/pelican-dev/wings:latest
    restart: always
    container_name: pelican_wings
    networks:
      - proxy
      - wings1
    ports:
#      - "8080:8080"
      - "2023:2023"
    tty: true
    environment:
      TZ: "America/Santiago"
      WINGS_UID: 1000
      WINGS_GID: 1000
      WINGS_USERNAME: pelican
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/lib/docker/containers/:/var/lib/docker/containers/"
      - "/etc/pelican/:/etc/pelican/"
      - "/var/lib/pelican/:/var/lib/pelican/"
      - "/var/log/pelican/:/var/log/pelican/"
      - "/tmp/pelican/:/tmp/pelican/"
   #   - "/etc/ssl/certs:/etc/ssl/certs:ro"
      - "/root/docker_stacks/traefik/letsencrypt/dumped/joseluna.dev/:/certs:ro"
      #- "/srv/daemon-data/:/srv/daemon-data/"
      #- "/etc/letsencrypt/:/etc/letsencrypt/"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.wings1.entrypoints=http"
      - "traefik.http.routers.wings1.rule=Host(`wings1.joseluna.dev`)"
      - "traefik.http.middlewares.wings1-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.wings1.middlewares=wings1-https-redirect"
      - "traefik.http.routers.wings1-secure.entrypoints=https"
      - "traefik.http.routers.wings1-secure.rule=Host(`wings1.joseluna.dev`)"
      - "traefik.http.routers.wings1-secure.tls=true"
      - "traefik.http.routers.wings1-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.wings1-secure.service=wings1"
      - "traefik.http.services.wings1.loadbalancer.server.port=8080"
#      - "traefik.http.services.wings1.loadbalancer.server.scheme=https"

networks:

  pelican:
   name: pelican

  proxy:
    external: true

  wings1:
    name: wings1
    driver: bridge
    ipam:
      config:
        - subnet: "172.22.0.0/16"
    driver_opts:
      com.docker.network.bridge.name: wings1
