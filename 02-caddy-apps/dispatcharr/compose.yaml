services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: unless-stopped
    ports:
      - 9191:9191
    volumes:
      - ./data:/data
    environment:
      - TZ=America/Santiago
      - DISPATCHARR_LOG_LEVEL=info
    networks:
      - caddy

networks:
  caddy:
    external: true
