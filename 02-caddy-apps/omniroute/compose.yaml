x-omniroute: &omniroute
    image: ${OMNIROUTE_IMAGE:-chachocl/omniroute}:${OMNIROUTE_TAG:-latest-cli}
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
        DATA_DIR: /app/data
        NODE_ENV: production
        CONTAINER_HOST: docker
        HOSTNAME: 0.0.0.0
        PORT: ${PORT:-20128}
        DASHBOARD_PORT: ${DASHBOARD_PORT:-20128}
        API_PORT: ${API_PORT:-20129}
        API_HOST: ${API_HOST:-0.0.0.0}
        REDIS_URL: redis://redis:6379
        BASE_URL: http://omniroute:20128
        QDRANT_HOST: qdrant
        QDRANT_PORT: 6333
        BIFROST_BASE_URL: http://bifrost:8080
    volumes:
        - ./data:/app/data
        - /var/run/docker.sock:/var/run/docker.sock
    networks:
        - caddy
        - omniroute-internal
    depends_on:
        redis:
            condition: service_healthy
        #        qdrant:
        #            condition: service_healthy
        bifrost:
            condition: service_healthy
    healthcheck:
        test: ["CMD", "node", "healthcheck.mjs"]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 30s

services:
    omniroute:
        <<: *omniroute

    redis:
        image: docker.io/library/redis:7-alpine
        container_name: omniroute-redis
        restart: unless-stopped
        command: redis-server --save 60 1 --loglevel warning
        volumes:
            - ./redis-data:/data
        networks:
            - omniroute-internal
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3

    qdrant:
        image: docker.io/qdrant/qdrant:v1.18
        container_name: omniroute-qdrant
        restart: unless-stopped
        volumes:
            - ./qdrant-data:/qdrant/storage
        environment:
            QDRANT__SERVICE__GRPC_PORT: 6334
        networks:
            - omniroute-internal
    #        healthcheck:
    #            test:
    #                [
    #                    "CMD",
    #                    "wget",
    #                    "--spider",
    #                    "-q",
    #                    "http://127.0.0.1:6333/readyz",
    #                ]
    #            interval: 15s
    #            timeout: 5s
    #            retries: 3
    #            start_period: 10s

    bifrost:
        image: maximhq/bifrost:v1.6.1
        container_name: omniroute-bifrost
        restart: unless-stopped
        volumes:
            - ./bifrost-data:/data
        environment:
            BIFROST_LOG_LEVEL: ${BIFROST_LOG_LEVEL:-info}
        networks:
            - omniroute-internal
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--spider",
                    "-q",
                    "http://127.0.0.1:8080/v1/models",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s

    cliproxyapi:
        image: ${CLIPROXYAPI_IMAGE:-eceasy/cli-proxy-api:latest}
        container_name: omniroute-cliproxyapi
        restart: unless-stopped
        volumes:
            - ./cliproxyapi/config.yaml:/CLIProxyAPI/config.yaml:ro
            - ./cliproxyapi-data:/root/.cli-proxy-api
        environment:
            PORT: ${CLIPROXYAPI_PORT:-8317}
            HOST: 0.0.0.0
        networks:
            - omniroute-internal
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--spider",
                    "-q",
                    "http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

networks:
    caddy:
        external: true
    omniroute-internal:
        driver: bridge
