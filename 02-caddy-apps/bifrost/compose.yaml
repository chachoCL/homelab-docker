services:
  bifrost:
    image: maximhq/bifrost:v1.4.17
    container_name: bifrost
    volumes:
      - ./data:/app/data
    environment:
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_STYLE=json
      - GOMEMLIMIT=3600MiB
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - caddy

networks:
  caddy: 
    external: true
