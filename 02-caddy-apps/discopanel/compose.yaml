services:
  discopanel:
    image: nickheyer/discopanel:latest
    container_name: discopanel
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8080:8080"         # DiscoPanel web interface
      - "25565:25565"       # Minecraft puerto principal
      - "27000-27010:27000-27010/tcp"  # Puertos adicionales para más servidores
      - "27000-27010:27000-27010/udp"  # UDP para Minecraft
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/docker_composes/discopanel/app/data:/app/data
      - /root/docker_composes/discopanel/backups:/app/backups
      - /root/docker_composes/discopanel/tmp:/app/tmp
    environment:
      - DISCOPANEL_DATA_DIR=/app/data
      - DISCOPANEL_HOST_DATA_PATH=/root/docker_composes/discopanel/app/data
      - TZ=America/Santiago
    extra_hosts:
      - "host.docker.internal:host-gateway"
