services:
  blinko-website:
    image: blinkospace/blinko:1.8.7
    container_name: blinko-website
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.blinko:/app/.blinko 
    labels:
      - sablier.enable=true
      - sablier.group=keep
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 1111:1111
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://blinko-website:1111/"]
      interval: 30s 
      timeout: 10s   
      retries: 5     
      start_period: 30s 
    networks:
      - blinko
      - caddy

  postgres:
    image: postgres:14
    container_name: blinko-postgres
    restart: always
    labels:
      - sablier.enable=true
      - sablier.group=keep
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Santiago
    volumes:
      - ./.db:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - blinko


networks:
  blinko:
    name: blinko
  caddy:
    external: true
