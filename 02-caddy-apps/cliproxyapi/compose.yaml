services:
    cli-proxy-api:
        image: eceasy/cli-proxy-api:v7.2.19
        container_name: cli-proxy-api
        environment:
            - MANAGEMENT_PASSWORD=${MANAGEMENT_PASSWORD}
            - DEPLOY=cloud
        # ports:
        #   - "8317:8317"
        #   - "8085:8085"
        #   - "1455:1455"
        #   - "54545:54545"
        #   - "51121:51121"
        #   - "11451:11451"
        volumes:
            - ./config.yaml:/CLIProxyAPI/config.yaml
            - ./auths:/root/.cli-proxy-api
            - ./logs:/CLIProxyAPI/logs
        restart: unless-stopped
        networks:
            - caddy

networks:
    caddy:
        external: true
